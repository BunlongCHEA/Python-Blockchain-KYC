# Mirror of Go-Blockchain-KYC/k8s/app/13-clusterissuer.yaml
#
# Staging issuer = no rate limits, issues UNTRUSTED certs.
# Use for testing TLS flow. Browser will show "Not Secure".
# Switch to letsencrypt-prod when ready:
#   server: https://acme-v02.api.letsencrypt.org/directory
#   privateKeySecretRef.name: letsencrypt-prod-key
#   cert-manager.io/cluster-issuer: "letsencrypt-prod"  in 05-gateway.yaml
#
# REQUIREMENTS:
#   cert-manager installed:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
# =============================================================

