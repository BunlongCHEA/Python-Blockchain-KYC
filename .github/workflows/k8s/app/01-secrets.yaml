# ⚠️  DO NOT commit real credentials here.
# Apply the real secret manually:
#
#   kubectl create secret generic kyc-python-secrets \
#     --from-literal=POSTGRES_PASSWORD='<your-password>' \
#     --from-literal=GOOGLE_APPLICATION_CREDENTIALS_BASE64='<base64-json>' \
#     -n kyc-blockchain
#
# Or use Sealed Secrets / External Secrets Operator for GitOps.
apiVersion: v1
kind: Secret
metadata:
  name: kyc-python-secrets
  namespace: kyc-blockchain
  labels:
    app.kubernetes.io/name: kyc-python
type: Opaque
# data must be base64 encoded, but stringData allows us to input plain text and it will handle encoding automatically.
stringData:
  POSTGRES_PASSWORD: "strongpassword123"
  # GOOGLE_APPLICATION_CREDENTIALS_BASE64: ""